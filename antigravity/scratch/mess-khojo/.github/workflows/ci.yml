name: CI — Lint, Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint → Test → Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node Setup ────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # ── Install Dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Run ESLint
        run: npm run lint

      # ── Unit Tests ────────────────────────────────────────────────────────
      - name: Run Vitest unit tests
        env:
          # Provide stub values so firebase.js doesn't throw on import
          VITE_FIREBASE_API_KEY: ci-stub-key
          VITE_FIREBASE_AUTH_DOMAIN: ci-stub.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-stub-project
          VITE_FIREBASE_STORAGE_BUCKET: ci-stub.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: 1:000000000000:web:ci-stub
          VITE_GOOGLE_MAPS_API_KEY: ci-stub-maps-key
          VITE_APP_ENV: test
          VITE_APP_VERSION: ${{ github.sha }}
        run: npm run test -- --run

      # ── Production Build ──────────────────────────────────────────────────
      - name: Build for production
        env:
          VITE_FIREBASE_API_KEY: ci-stub-key
          VITE_FIREBASE_AUTH_DOMAIN: ci-stub.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-stub-project
          VITE_FIREBASE_STORAGE_BUCKET: ci-stub.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: 1:000000000000:web:ci-stub
          VITE_GOOGLE_MAPS_API_KEY: ci-stub-maps-key
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ github.sha }}
        run: npm run build

      # ── Upload Build Artifact ──────────────────────────────────────────────
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: client/dist
          retention-days: 7
